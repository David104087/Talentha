services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: talentha-backend
    ports:
      - "8001:8000"
    env_file:
      - ./.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: talentha-frontend
    ports:
      - "5174:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
